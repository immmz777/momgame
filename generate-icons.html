<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Icon Generator</title></head>
<body>
  <h2>消消乐 App Icon Generator</h2>
  <p>Click the buttons to download each icon. Save them into the <code>icons/</code> folder.</p>
  <canvas id="c192" width="192" height="192" style="border:1px solid #ccc;margin:5px"></canvas>
  <canvas id="c512" width="512" height="512" style="border:1px solid #ccc;margin:5px"></canvas>
  <script>
    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const w = canvas.width, h = canvas.height;
      // gradient background
      const g = ctx.createLinearGradient(0, 0, w, h);
      g.addColorStop(0, '#378ADD');
      g.addColorStop(1, '#1a5fa0');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.roundRect(w*0.08, h*0.08, w*0.84, h*0.84, w*0.22);
      ctx.fill();
      // inner glow
      const g2 = ctx.createRadialGradient(w*0.3, h*0.35, 0, w*0.5, h*0.5, w*0.7);
      g2.addColorStop(0, 'rgba(255,255,255,0.25)');
      g2.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = g2;
      ctx.beginPath();
      ctx.roundRect(w*0.08, h*0.08, w*0.84, h*0.84, w*0.22);
      ctx.fill();
      // emoji-like circles: 3x3 grid of colored dots
      const colors = ['#ff4444','#ffcc00','#44cc44','#4488ff','#cc44ff','#ff8844'];
      const grid = 3, gap = w * 0.18, r = w * 0.08;
      const ox = w * 0.24, oy = h * 0.26;
      for (let row = 0; row < grid; row++) {
        for (let col = 0; col < grid; col++) {
          ctx.fillStyle = colors[(row * grid + col) % colors.length];
          ctx.beginPath();
          ctx.arc(ox + col * gap, oy + row * gap, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function download(canvas, name) {
      canvas.toBlob(b => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = name;
        a.click();
      });
    }

    drawIcon(document.getElementById('c192'));
    drawIcon(document.getElementById('c512'));

    const c192 = document.getElementById('c192'), c512 = document.getElementById('c512');
    c192.style.cursor = 'pointer';
    c512.style.cursor = 'pointer';
    c192.title = 'Click to download icon-192.png';
    c512.title = 'Click to download icon-512.png';
    c192.onclick = () => download(c192, 'icon-192.png');
    c512.onclick = () => download(c512, 'icon-512.png');
  </script>
</body>
</html>
